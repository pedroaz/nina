name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: |
          uv sync
          cd apps/tui
          bun install --frozen-lockfile

      - name: Validate Python
        run: make check

      - name: Validate TUI
        run: |
          cd apps/tui
          bun run check

      - name: Build Python wheels
        run: |
          rm -rf release
          mkdir -p release/wheels
          (cd packages/nina_core && uv build --wheel --out-dir ../../release/wheels)
          (cd apps/server && uv build --wheel --out-dir ../../release/wheels)
          (cd apps/cli && uv build --wheel --out-dir ../../release/wheels)

      - name: Build TUI binaries
        run: |
          mkdir -p release/tui
          cd apps/tui
          bun build src/main.ts --compile --target=bun-linux-x64 --outfile ../../release/tui/nina-tui-linux-x64
          bun build src/main.ts --compile --target=bun-darwin-x64 --outfile ../../release/tui/nina-tui-macos-x64
          bun build src/main.ts --compile --target=bun-darwin-arm64 --outfile ../../release/tui/nina-tui-macos-arm64
          bun build src/main.ts --compile --target=bun-windows-x64 --outfile ../../release/tui/nina-tui-windows-x64.exe

      - name: Render installers
        env:
          NINA_REPOSITORY: ${{ github.repository }}
        run: |
          mkdir -p release/installers
          sed "s#__NINA_REPOSITORY__#${NINA_REPOSITORY}#g" scripts/install.sh > release/installers/install.sh
          sed "s#__NINA_REPOSITORY__#${NINA_REPOSITORY}#g" scripts/install.ps1 > release/installers/install.ps1

      - name: Package release assets
        run: |
          mkdir -p release/assets release/staging
          for target in linux-x64 macos-x64 macos-arm64; do
            staging="release/staging/nina-${target}"
            mkdir -p "${staging}/wheels" "${staging}/bin"
            cp release/wheels/*.whl "${staging}/wheels/"
            cp "release/tui/nina-tui-${target}" "${staging}/bin/nina-tui"
            chmod +x "${staging}/bin/nina-tui"
            tar -C "${staging}" -czf "release/assets/nina-latest-${target}.tar.gz" .
          done
          staging="release/staging/nina-windows-x64"
          mkdir -p "${staging}/wheels" "${staging}/bin"
          cp release/wheels/*.whl "${staging}/wheels/"
          cp release/tui/nina-tui-windows-x64.exe "${staging}/bin/nina-tui.exe"
          (cd "${staging}" && zip -r "../../assets/nina-latest-windows-x64.zip" .)
          cp release/installers/install.sh release/assets/install.sh
          cp release/installers/install.ps1 release/assets/install.ps1

      - name: Smoke packaged wheels
        run: |
          python -m venv /tmp/nina-smoke
          /tmp/nina-smoke/bin/python -m pip install --upgrade pip
          /tmp/nina-smoke/bin/python -m pip install release/wheels/*.whl
          /tmp/nina-smoke/bin/nina version

      - name: Update latest tag
        run: |
          git tag -f latest "$GITHUB_SHA"
          git push origin latest --force

      - name: Publish latest release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Nina latest
          body: |
            Moving release generated from `${{ github.sha }}` on every push to `main`.
          prerelease: true
          make_latest: true
          overwrite_files: true
          files: |
            release/assets/nina-latest-linux-x64.tar.gz
            release/assets/nina-latest-macos-x64.tar.gz
            release/assets/nina-latest-macos-arm64.tar.gz
            release/assets/nina-latest-windows-x64.zip
            release/assets/install.sh
            release/assets/install.ps1
