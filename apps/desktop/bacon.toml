[jobs.check]
command = ["cargo", "check"]
need_stdout = true

[jobs.run]
command = ["cargo", "run"]
need_stdout = true
allow_warnings = true

[jobs.clippy]
command = ["cargo", "clippy", "--all-targets", "--all-features", "--", "-D", "warnings"]
need_stdout = true

[exports.cargo-json-spans]
auto = true
