[project]
name = "nina-core"
version = "0.1.4"
description = "Core domain services, models, and workflows for Nina"
readme = "README.md"
requires-python = ">=3.12,<3.13"
license = { text = "MIT" }
authors = [{ name = "Nina Team" }]

dependencies = [
    "sqlalchemy[asyncio]>=2.0.0",
    "alembic>=1.13.0",
    "pydantic>=2.7.0",
    "pydantic-settings>=2.3.0",
    "pyyaml>=6.0",
    "click>=8.1.0",
    "httpx>=0.27.0",
    "python-frontmatter>=1.0.0",
    "markdown>=3.6.0",
    "python-dateutil>=2.9.0",
    "apscheduler>=3.10.0",
    "croniter>=2.0.0",
    "openai>=1.30.0",
    "numpy>=1.26.0",
    "watchdog>=4.0.0",
    "selectolax>=0.3.0",
    "soundcard>=0.4.2",
    "soxr>=0.3.7",
]

[project.optional-dependencies]
# Local audio transcription. The default `transcription.backend = local_whisper`
# needs this extra; install with `pip install nina-core[transcription]`. From
# inside an installed nina you can also run `nina setup transcription`.
transcription = ["faster-whisper>=1.0.0"]
# macOS Process Tap support (Core Audio private API via PyObjC). Nina's
# `nina setup` installs this automatically on Darwin.
darwin = [
    "pyobjc-framework-CoreAudio>=10.0",
    "pyobjc-framework-AVFoundation>=10.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["nina_core"]

[tool.ruff]
target-version = "py312"
line-length = 100

[tool.pyright]
pythonVersion = "3.12"
strict = ["nina_core"]
