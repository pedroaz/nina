[project]
name = "nina-core"
version = "0.1.3"
description = "Core domain services, models, and workflows for Nina"
readme = "README.md"
requires-python = ">=3.12"
license = { text = "MIT" }
authors = [{ name = "Nina Team" }]

dependencies = [
    "sqlalchemy[asyncio]>=2.0.0",
    "alembic>=1.13.0",
    "pydantic>=2.7.0",
    "pydantic-settings>=2.3.0",
    "pyyaml>=6.0",
    "click>=8.1.0",
    "httpx>=0.27.0",
    "python-frontmatter>=1.0.0",
    "markdown>=3.6.0",
    "python-dateutil>=2.9.0",
    "apscheduler>=3.10.0",
    "openai>=1.30.0",
    "numpy>=1.26.0",
    "watchdog>=4.0.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["nina_core"]

[tool.ruff]
target-version = "py312"
line-length = 100

[tool.pyright]
pythonVersion = "3.12"
strict = ["nina_core"]
